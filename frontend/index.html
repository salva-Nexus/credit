<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Meta ──────────────────────────────────────────────────── -->
    <title>Credit Vault — Secure Online Banking | Zero Fees, 4.75% APY</title>
    <meta name="description" content="Credit Vault offers FDIC-insured online banking with zero monthly fees, 4.75% APY savings, instant domestic transfers, and international wires to 50+ countries. Open an account in under 5 minutes." />
    <meta name="keywords" content="online banking, FDIC insured bank, high yield savings account, zero fee checking, instant bank transfer, international wire transfer, mobile banking, digital bank" />
    <meta name="author" content="Credit Vault, N.A." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://creditvault.org/" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ─────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Credit Vault" />
    <meta property="og:title" content="Credit Vault — Secure Online Banking | Zero Fees, 4.75% APY" />
    <meta property="og:description" content="FDIC-insured banking with no monthly fees, 4.75% APY savings accounts, instant transfers, and 24/7 support. Join 4.8 million customers. Open an account free in minutes." />
    <meta property="og:url" content="https://creditvault.org/" />
    <meta property="og:image" content="https://creditvault.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Credit Vault — Secure Online Banking dashboard showing account balance and quick actions" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X Card ──────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@creditvault" />
    <meta name="twitter:creator" content="@creditvault" />
    <meta name="twitter:title" content="Credit Vault — Zero Fees. 4.75% APY. FDIC Insured." />
    <meta name="twitter:description" content="Modern online banking built for real people. No monthly fees, no minimum balance, instant transfers, and a savings rate that actually matters. Open free in 5 minutes." />
    <meta name="twitter:image" content="https://creditvault.org/og-image.png" />
    <meta name="twitter:image:alt" content="Credit Vault banking dashboard" />

    <!-- ── Favicon & App Icons ───────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#1a3c5e" />
    <meta name="msapplication-TileColor" content="#1a3c5e" />

    <!-- ── Structured Data — Organization ───────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BankOrCreditUnion",
      "name": "Credit Vault",
      "legalName": "Credit Vault, N.A.",
      "url": "https://creditvault.org",
      "logo": "https://creditvault.org/logo.png",
      "description": "Credit Vault is an FDIC-insured online bank offering zero-fee checking accounts, high-yield savings accounts with 4.75% APY, instant domestic transfers, international wire transfers to 50+ countries, and 24/7 customer support.",
      "foundingDate": "1998",
      "areaServed": "US",
      "currenciesAccepted": "USD",
      "memberOf": {
        "@type": "Organization",
        "name": "Federal Deposit Insurance Corporation",
        "url": "https://www.fdic.gov"
      },
      "sameAs": [
        "https://twitter.com/creditvault",
        "https://www.linkedin.com/company/creditvault",
        "https://www.facebook.com/creditvault"
      ],
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "availableLanguage": "English",
          "contactOption": "TollFree",
          "hoursAvailable": {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
            "opens": "00:00",
            "closes": "23:59"
          }
        }
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Banking Products",
        "itemListElement": [
          {
            "@type": "Offer",
            "name": "Essential Checking",
            "description": "Zero monthly fee checking account with free debit card, mobile check deposit, bill pay, and FDIC insurance.",
            "price": "0",
            "priceCurrency": "USD"
          },
          {
            "@type": "Offer",
            "name": "Premium Savings",
            "description": "High-yield savings account earning 4.75% APY with no minimum balance and no monthly fees.",
            "price": "0",
            "priceCurrency": "USD"
          },
          {
            "@type": "Offer",
            "name": "Business Banking",
            "description": "Dedicated business account with up to 5 user seats, unlimited transactions, and priority wire processing.",
            "price": "15",
            "priceCurrency": "USD",
            "priceSpecification": {
              "@type": "UnitPriceSpecification",
              "price": "15",
              "priceCurrency": "USD",
              "unitCode": "MON"
            }
          }
        ]
      }
    }
    </script>

    <!-- ── Structured Data — WebSite + Sitelinks Search Box ─────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Credit Vault",
      "url": "https://creditvault.org",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://creditvault.org/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── Structured Data — FAQ (from landing page) ─────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Credit Vault FDIC insured?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Credit Vault, N.A. is a member of the Federal Deposit Insurance Corporation (FDIC). Your deposits are insured up to $250,000 per depositor, per account ownership category — the maximum allowed by law."
          }
        },
        {
          "@type": "Question",
          "name": "Are there any hidden fees?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Our Essential Checking account has zero monthly fees, zero minimum balance requirements, and zero overdraft fees. We make money through interchange fees when you use your debit card — not from charging you."
          }
        },
        {
          "@type": "Question",
          "name": "How do I open an account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Click 'Open Account' and complete our online form in under 5 minutes. You'll need your Social Security Number, a valid government-issued ID, and a funding source. We'll verify your identity instantly and your account will be active the same day."
          }
        },
        {
          "@type": "Question",
          "name": "How secure is my money?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Extremely. We use 256-bit AES encryption for all data at rest and TLS 1.3 for data in transit. Every login requires a one-time security code sent to your registered email. Our fraud detection system monitors 100% of transactions in real time."
          }
        },
        {
          "@type": "Question",
          "name": "How long do transfers take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Domestic ACH transfers: 1–2 business days. Domestic wire transfers: same day if submitted before 3PM EST. International wire transfers: 1–5 business days depending on the destination country and receiving bank."
          }
        },
        {
          "@type": "Question",
          "name": "What is the minimum for international wire transfers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "International wire transfers have a minimum of $50,000 USD. This threshold exists to cover compliance costs and ensure we can provide the level of verification required for international transactions. Domestic transfers have no minimum."
          }
        }
      ]
    }
    </script>

    <!-- ── Structured Data — Breadcrumb ──────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://creditvault.org/"
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Performance hints ─────────────────────────────────────────────── -->
    <link rel="preload" href="/src/main.jsx" as="script" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
