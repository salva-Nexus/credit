<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Credit Vault Bank — Secure Online Banking | FDIC Insured</title>
    <meta
      name="description"
      content="Credit Vault Bank offers secure online banking with zero monthly fees, instant transfers, international wires, and FDIC-insured accounts. Open a free account in 5 minutes."
    />
    <meta
      name="keywords"
      content="online banking, secure bank account, FDIC insured bank, free checking account, international wire transfer, savings account, Credit Vault Bank"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Credit Vault Bank" />
    <link rel="canonical" href="https://creditvault.org/" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://creditvault.org/" />
    <meta
      property="og:title"
      content="Credit Vault Bank — Secure Online Banking"
    />
    <meta
      property="og:description"
      content="Zero monthly fees, FDIC-insured accounts, instant transfers and international wires. Open your free account today."
    />
    <meta property="og:image" content="https://creditvault.org/og-image.png" />
    <meta property="og:site_name" content="Credit Vault Bank" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://creditvault.org/" />
    <meta
      name="twitter:title"
      content="Credit Vault Bank — Secure Online Banking"
    />
    <meta
      name="twitter:description"
      content="Zero monthly fees, FDIC-insured accounts, instant transfers and international wires. Open your free account today."
    />
    <meta name="twitter:image" content="https://creditvault.org/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BankOrCreditUnion",
        "name": "Credit Vault Bank",
        "url": "https://creditvault.org",
        "logo": "https://creditvault.org/favicon.svg",
        "description": "Credit Vault Bank offers secure online banking with zero monthly fees, FDIC-insured accounts, instant transfers, and international wire transfers.",
        "foundingDate": "1998",
        "areaServed": "US",
        "sameAs": [],
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "creditvault.support@gmail.com",
          "contactType": "customer support",
          "availableLanguage": "English"
        },
        "offers": [
          {
            "@type": "Offer",
            "name": "Essential Checking Account",
            "description": "Free checking account with no monthly fees, FDIC insured",
            "price": "0",
            "priceCurrency": "USD"
          },
          {
            "@type": "Offer",
            "name": "Savings Account",
            "description": "Savings account with no minimum balance and no monthly fees",
            "price": "0",
            "priceCurrency": "USD"
          }
        ]
      }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
